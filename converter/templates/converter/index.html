<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PDF to XLSX Converter</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        margin: 32px;
        background: #f4f6f8;
        color: #1b1f24;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        background: #ffffff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(27, 31, 36, 0.12);
      }
      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }
      .row {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }
      .panel {
        flex: 1 1 320px;
        background: #f9fafb;
        border: 1px solid #e3e6ea;
        border-radius: 10px;
        padding: 16px;
      }
      .panel h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        padding: 8px 0;
        border-bottom: 1px solid #e3e6ea;
        font-size: 14px;
      }
      li:last-child {
        border-bottom: none;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
      }
      button {
        background: #1f6feb;
        color: #ffffff;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      button.danger {
        background: #cf222e;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .progress {
        height: 12px;
        background: #e3e6ea;
        border-radius: 999px;
        overflow: hidden;
        width: 100%;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #1f6feb, #2ea043);
        transition: width 0.2s ease;
      }
      .status {
        font-size: 13px;
        color: #57606a;
      }
      .error {
        color: #cf222e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PDF to XLSX Converter</h1>
      <form id="convert-form" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="actions">
          <input
            id="file-input"
            type="file"
            name="pdf_files"
            accept="application/pdf"
            multiple
            required
          />
          <button id="upload-btn" type="button">Upload</button>
          <button id="convert-btn" type="submit">Upload and Convert</button>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="status" id="status-text">Select PDF files to convert.</p>
      </form>

      <div class="panel" style="margin: 20px 0;">
        <h2>Uploads Manager</h2>
        <div class="actions">
          <label>
            <input type="checkbox" id="select-all" />
            Select all
          </label>
          <button id="refresh-uploads" type="button">Refresh</button>
          <button id="convert-selected" type="button">Convert selected</button>
          <button id="delete-selected" class="danger" type="button">
            Delete selected
          </button>
        </div>
        <div class="progress" style="margin-bottom: 8px;">
          <div class="progress-bar" id="uploads-progress"></div>
        </div>
        <ul id="uploads-list"></ul>
        <p class="status" id="uploads-status">No uploads loaded.</p>
      </div>

      <div class="panel" style="margin: 20px 0;">
        <h2>Output Manager</h2>
        <div class="actions">
          <label>
            <input type="checkbox" id="select-all-outputs" />
            Select all
          </label>
          <button id="refresh-outputs" type="button">Refresh</button>
          <button id="copy-outputs" type="button">Copy selected to</button>
          <button id="move-outputs" type="button">Move selected to</button>
          <button id="delete-outputs" class="danger" type="button">
            Delete selected
          </button>
        </div>
        <div class="progress" style="margin-bottom: 8px;">
          <div class="progress-bar" id="outputs-progress"></div>
        </div>
        <ul id="outputs-list"></ul>
        <p class="status" id="outputs-status">No outputs loaded.</p>
      </div>

      <div class="row">
        <div class="panel">
          <div class="actions">
            <h2 style="margin: 0;">Input List</h2>
            <button id="refresh-inputs" type="button">Refresh</button>
          </div>
          <ul id="input-list"></ul>
        </div>
        <div class="panel">
          <div class="actions">
            <h2 style="margin: 0;">Output List</h2>
            <button id="refresh-output-list" type="button">Refresh</button>
          </div>
          <ul id="output-list"></ul>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("convert-form");
      const fileInput = document.getElementById("file-input");
      const inputList = document.getElementById("input-list");
      const outputList = document.getElementById("output-list");
      const progressBar = document.getElementById("progress-bar");
      const statusText = document.getElementById("status-text");
      const convertBtn = document.getElementById("convert-btn");
      const uploadBtn = document.getElementById("upload-btn");
      const uploadsList = document.getElementById("uploads-list");
      const uploadsStatus = document.getElementById("uploads-status");
      const uploadsProgress = document.getElementById("uploads-progress");
      const selectAll = document.getElementById("select-all");
      const refreshUploads = document.getElementById("refresh-uploads");
      const convertSelected = document.getElementById("convert-selected");
      const deleteSelected = document.getElementById("delete-selected");
      const outputsList = document.getElementById("outputs-list");
      const outputsStatus = document.getElementById("outputs-status");
      const outputsProgress = document.getElementById("outputs-progress");
      const selectAllOutputs = document.getElementById("select-all-outputs");
      const refreshOutputs = document.getElementById("refresh-outputs");
      const deleteOutputs = document.getElementById("delete-outputs");
      const copyOutputs = document.getElementById("copy-outputs");
      const moveOutputs = document.getElementById("move-outputs");
      const refreshInputs = document.getElementById("refresh-inputs");
      const refreshOutputList = document.getElementById("refresh-output-list");

      function clearList(list) {
        while (list.firstChild) {
          list.removeChild(list.firstChild);
        }
      }

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.classList.toggle("error", isError);
      }

      function setUploadsStatus(message, isError = false) {
        uploadsStatus.textContent = message;
        uploadsStatus.classList.toggle("error", isError);
      }

      function setOutputsStatus(message, isError = false) {
        outputsStatus.textContent = message;
        outputsStatus.classList.toggle("error", isError);
      }

      function clearUploadsList() {
        clearList(uploadsList);
        selectAll.checked = false;
      }

      function clearOutputsList() {
        clearList(outputsList);
        selectAllOutputs.checked = false;
      }

      function setProgress(bar, current, total) {
        if (!total) {
          bar.style.width = "0%";
          return;
        }
        const percent = Math.max(
          0,
          Math.min(100, Math.round((current / total) * 100))
        );
        bar.style.width = `${percent}%`;
      }

      function renderUploads(files) {
        clearUploadsList();
        if (!files.length) {
          setUploadsStatus("No files in media/uploads.");
          return;
        }
        files.forEach((file) => {
          const item = document.createElement("li");
          const label = document.createElement("label");
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = file.name;
          checkbox.className = "upload-checkbox";
          label.appendChild(checkbox);
          const sizeKb = Math.round(file.size / 1024);
          label.appendChild(
            document.createTextNode(` ${file.name} (${sizeKb} KB)`)
          );
          item.appendChild(label);
          uploadsList.appendChild(item);
        });
        setUploadsStatus(`${files.length} file(s) found.`);
      }

      function renderOutputs(files) {
        clearOutputsList();
        if (!files.length) {
          setOutputsStatus("No files in media/outputs.");
          return;
        }
        files.forEach((file) => {
          const item = document.createElement("li");
          const label = document.createElement("label");
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = file.name;
          checkbox.dataset.url = file.url || "";
          checkbox.className = "output-checkbox";
          label.appendChild(checkbox);
          const sizeKb = Math.round(file.size / 1024);
          label.appendChild(
            document.createTextNode(` ${file.name} (${sizeKb} KB)`)
          );
          item.appendChild(label);
          outputsList.appendChild(item);
        });
        setOutputsStatus(`${files.length} file(s) found.`);
      }

      async function fetchUploads() {
        setUploadsStatus("Loading uploads...");
        setProgress(uploadsProgress, 0, 0);
        try {
          const response = await fetch("{% url 'list_uploads' %}");
          const data = await response.json();
          if (!response.ok) {
            setUploadsStatus(data.error || "Failed to load uploads.", true);
            return;
          }
          renderUploads(data.files || []);
        } catch (error) {
          setUploadsStatus("Failed to load uploads.", true);
        }
      }

      async function fetchOutputs() {
        setOutputsStatus("Loading outputs...");
        setProgress(outputsProgress, 0, 0);
        try {
          const response = await fetch("{% url 'list_outputs' %}");
          const data = await response.json();
          if (!response.ok) {
            setOutputsStatus(data.error || "Failed to load outputs.", true);
            return;
          }
          renderOutputs(data.files || []);
        } catch (error) {
          setOutputsStatus("Failed to load outputs.", true);
        }
      }

      async function deleteUploads() {
        const selected = Array.from(
          document.querySelectorAll(".upload-checkbox:checked")
        ).map((input) => input.value);
        if (!selected.length) {
          setUploadsStatus("Select files to delete.", true);
          return;
        }
        setUploadsStatus("Deleting selected uploads...");
        setProgress(uploadsProgress, 0, selected.length);
        let completed = 0;
        let errors = 0;
        for (const name of selected) {
          const formData = new FormData();
          formData.append("names", name);
          try {
            const response = await fetch("{% url 'delete_uploads' %}", {
              method: "POST",
              headers: {
                "X-CSRFToken": "{{ csrf_token }}",
              },
              body: formData,
            });
            if (!response.ok) {
              errors += 1;
            }
          } catch (error) {
            errors += 1;
          }
          completed += 1;
          setProgress(uploadsProgress, completed, selected.length);
        }
        setUploadsStatus(
          errors
            ? `Delete completed with ${errors} error(s).`
            : "Delete completed."
        );
        fetchUploads();
      }

      async function convertSelectedUploads() {
        const selected = Array.from(
          document.querySelectorAll(".upload-checkbox:checked")
        ).map((input) => input.value);
        if (!selected.length) {
          setUploadsStatus("Select files to convert.", true);
          return;
        }

        setUploadsStatus("Converting selected uploads...");
        setProgress(uploadsProgress, 0, selected.length);
        let completed = 0;
        let errors = 0;
        for (const name of selected) {
          const formData = new FormData();
          formData.append("names", name);
          try {
            const response = await fetch(
              "{% url 'convert_selected_uploads' %}",
              {
                method: "POST",
                headers: {
                  "X-CSRFToken": "{{ csrf_token }}",
                },
                body: formData,
              }
            );
            const data = await response.json();
            if (!response.ok) {
              errors += 1;
            } else if (data.results) {
              data.results.forEach((result) => {
                const item = document.createElement("li");
                if (result.error) {
                  errors += 1;
                  item.textContent = `${result.name}: ${result.error}`;
                  item.classList.add("error");
                } else {
                  const link = document.createElement("a");
                  link.href = result.url;
                  link.textContent = `${result.name} -> ${result.output}`;
                  link.setAttribute("download", result.output);
                  item.appendChild(link);
                }
                outputList.appendChild(item);
              });
            }
          } catch (error) {
            errors += 1;
          }
          completed += 1;
          setProgress(uploadsProgress, completed, selected.length);
        }
        setUploadsStatus(
          errors
            ? `Conversion completed with ${errors} error(s).`
            : "Conversion completed."
        );
        fetchOutputs();
      }

      async function deleteOutputFiles() {
        const selected = Array.from(
          document.querySelectorAll(".output-checkbox:checked")
        ).map((input) => input.value);
        if (!selected.length) {
          setOutputsStatus("Select files to delete.", true);
          return;
        }
        setOutputsStatus("Deleting selected outputs...");
        setProgress(outputsProgress, 0, selected.length);
        let completed = 0;
        let errors = 0;
        for (const name of selected) {
          const formData = new FormData();
          formData.append("names", name);
          try {
            const response = await fetch("{% url 'delete_outputs' %}", {
              method: "POST",
              headers: {
                "X-CSRFToken": "{{ csrf_token }}",
              },
              body: formData,
            });
            if (!response.ok) {
              errors += 1;
            }
          } catch (error) {
            errors += 1;
          }
          completed += 1;
          setProgress(outputsProgress, completed, selected.length);
        }
        setOutputsStatus(
          errors
            ? `Delete completed with ${errors} error(s).`
            : "Delete completed."
        );
        fetchOutputs();
      }

      async function copyOrMoveWithDirectoryPicker(actionLabel, deleteAfterCopy) {
        const selected = Array.from(
          document.querySelectorAll(".output-checkbox:checked")
        ).map((input) => ({
          name: input.value,
          url: input.dataset.url,
        }));
        if (!selected.length) {
          setOutputsStatus("Select files to process.", true);
          return;
        }

        if (!window.showDirectoryPicker) {
          setOutputsStatus("Directory picker not supported.", true);
          return;
        }

        let directoryHandle;
        try {
          directoryHandle = await window.showDirectoryPicker({
            mode: "readwrite",
            startIn: "downloads",
          });
        } catch (error) {
          if (error && error.name === "AbortError") {
            setOutputsStatus("Cancelled.");
            return;
          }
          setOutputsStatus("Directory selection failed.", true);
          return;
        }

        setOutputsStatus(`${actionLabel} in progress...`);
        const failures = [];
        setProgress(outputsProgress, 0, selected.length);
        let completed = 0;
        for (const file of selected) {
          try {
            if (!file.url) {
              throw new Error("Missing file URL.");
            }
            const response = await fetch(file.url);
            if (!response.ok) {
              throw new Error("Failed to fetch file.");
            }
            const blob = await response.blob();
            const fileHandle = await directoryHandle.getFileHandle(file.name, {
              create: true,
            });
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
          } catch (error) {
            failures.push(file.name);
          }
          completed += 1;
          setProgress(outputsProgress, completed, selected.length);
        }

        if (deleteAfterCopy) {
          const formData = new FormData();
          selected.forEach((file) => formData.append("names", file.name));
          await fetch("{% url 'delete_outputs' %}", {
            method: "POST",
            headers: {
              "X-CSRFToken": "{{ csrf_token }}",
            },
            body: formData,
          });
        }

        if (failures.length) {
          setOutputsStatus(
            `${actionLabel} done with errors: ${failures.length} failed.`,
            true
          );
        } else {
          setOutputsStatus(`${actionLabel} done.`);
        }
        fetchOutputs();
      }

      async function submitOutputAction(actionUrl, actionLabel) {
        const selected = Array.from(
          document.querySelectorAll(".output-checkbox:checked")
        ).map((input) => input.value);
        if (!selected.length) {
          setOutputsStatus("Select files to process.", true);
          return;
        }
        const destination = window.prompt(
          `${actionLabel} destination path (absolute or relative to project root):`
        );
        if (!destination) {
          setOutputsStatus("Destination path is required.", true);
          return;
        }
        setOutputsStatus(`${actionLabel} in progress...`);
        setProgress(outputsProgress, 0, selected.length);
        let completed = 0;
        let errors = 0;
        for (const name of selected) {
          const formData = new FormData();
          formData.append("names", name);
          formData.append("dest", destination);
          try {
            const response = await fetch(actionUrl, {
              method: "POST",
              headers: {
                "X-CSRFToken": "{{ csrf_token }}",
              },
              body: formData,
            });
            if (!response.ok) {
              errors += 1;
            }
          } catch (error) {
            errors += 1;
          }
          completed += 1;
          setProgress(outputsProgress, completed, selected.length);
        }
        setOutputsStatus(
          `${actionLabel} done. ${errors ? `${errors} error(s).` : "All good."}`
        );
        fetchOutputs();
      }

      function renderInputs(files) {
        clearList(inputList);
        if (!files.length) {
          setStatus("Select PDF files to convert.");
          return;
        }
        files.forEach((file) => {
          const item = document.createElement("li");
          item.textContent = file.name;
          inputList.appendChild(item);
        });
        setStatus(`${files.length} file(s) ready for conversion.`);
      }

      function refreshInputListFromSelection() {
        renderInputs(Array.from(fileInput.files));
      }

      fileInput.addEventListener("change", () => {
        renderInputs(Array.from(fileInput.files));
        clearList(outputList);
        progressBar.style.width = "0%";
      });

      uploadBtn.addEventListener("click", async () => {
        if (!fileInput.files.length) {
          setStatus("Please select at least one PDF.", true);
          return;
        }

        setStatus("Uploading...");
        const files = Array.from(fileInput.files);
        let completed = 0;
        let errors = 0;

        for (const file of files) {
          const formData = new FormData();
          formData.append("pdf_files", file);

          const xhr = new XMLHttpRequest();
          const progressPromise = new Promise((resolve) => {
            xhr.upload.onprogress = (event) => {
              if (event.lengthComputable) {
                const percent = event.loaded / event.total;
                const overall = (completed + percent) / files.length;
                progressBar.style.width = `${Math.round(overall * 100)}%`;
                setStatus(`Uploading... ${Math.round(overall * 100)}%`);
              }
            };
            xhr.onload = () => resolve();
            xhr.onerror = () => resolve();
          });

          xhr.open("POST", "{% url 'upload_files' %}");
          xhr.responseType = "json";
          xhr.setRequestHeader("X-CSRFToken", "{{ csrf_token }}");
          xhr.send(formData);

          await progressPromise;
          if (xhr.status !== 200) {
            errors += 1;
          }
          completed += 1;
          setProgress(progressBar, completed, files.length);
        }

        setStatus(
          errors ? `Upload completed with ${errors} error(s).` : "Upload complete."
        );
        fetchUploads();
      });

      selectAll.addEventListener("change", () => {
        const checkboxes = document.querySelectorAll(".upload-checkbox");
        checkboxes.forEach((checkbox) => {
          checkbox.checked = selectAll.checked;
        });
      });

      selectAllOutputs.addEventListener("change", () => {
        const checkboxes = document.querySelectorAll(".output-checkbox");
        checkboxes.forEach((checkbox) => {
          checkbox.checked = selectAllOutputs.checked;
        });
      });

      refreshUploads.addEventListener("click", fetchUploads);
      convertSelected.addEventListener("click", convertSelectedUploads);
      deleteSelected.addEventListener("click", deleteUploads);
      refreshOutputs.addEventListener("click", fetchOutputs);
      deleteOutputs.addEventListener("click", deleteOutputFiles);
      refreshInputs.addEventListener("click", refreshInputListFromSelection);
      refreshOutputList.addEventListener("click", () => fetchOutputs());
      copyOutputs.addEventListener("click", () => {
        if (window.showDirectoryPicker) {
          copyOrMoveWithDirectoryPicker("Copy", false);
        } else {
          submitOutputAction("{% url 'copy_outputs' %}", "Copy");
        }
      });
      moveOutputs.addEventListener("click", () => {
        if (window.showDirectoryPicker) {
          copyOrMoveWithDirectoryPicker("Move", true);
        } else {
          submitOutputAction("{% url 'move_outputs' %}", "Move");
        }
      });

      fetchUploads();
      fetchOutputs();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!fileInput.files.length) {
          setStatus("Please select at least one PDF.", true);
          return;
        }

        clearList(outputList);
        progressBar.style.width = "0%";
        convertBtn.disabled = true;
        setStatus("Uploading and converting...");

        const files = Array.from(fileInput.files);
        let completed = 0;
        let errors = 0;

        for (const file of files) {
          const formData = new FormData();
          formData.append("pdf_files", file);

          const xhr = new XMLHttpRequest();
          const progressPromise = new Promise((resolve) => {
            xhr.upload.onprogress = (event) => {
              if (event.lengthComputable) {
                const percent = event.loaded / event.total;
                const overall = (completed + percent) / files.length;
                progressBar.style.width = `${Math.round(overall * 100)}%`;
                setStatus(`Uploading... ${Math.round(overall * 100)}%`);
              }
            };
            xhr.onload = () => resolve();
            xhr.onerror = () => resolve();
          });

          xhr.open("POST", "{% url 'convert_files' %}");
          xhr.responseType = "json";
          xhr.setRequestHeader("X-CSRFToken", "{{ csrf_token }}");
          xhr.send(formData);

          await progressPromise;
          if (xhr.status !== 200) {
            errors += 1;
          } else {
            const data = xhr.response;
            if (data && data.results) {
              data.results.forEach((result) => {
                const item = document.createElement("li");
                if (result.error) {
                  errors += 1;
                  item.textContent = `${result.name}: ${result.error}`;
                  item.classList.add("error");
                } else {
                  const link = document.createElement("a");
                  link.href = result.url;
                  link.textContent = `${result.name} -> ${result.output}`;
                  link.setAttribute("download", result.output);
                  item.appendChild(link);
                }
                outputList.appendChild(item);
              });
            }
          }
          completed += 1;
          setProgress(progressBar, completed, files.length);
        }

        convertBtn.disabled = false;
        setStatus(
          errors
            ? `Conversion completed with ${errors} error(s).`
            : "Conversion complete."
        );
        fetchOutputs();
      });
    </script>
  </body>
</html>
